<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>North of England Art Exhibitions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f3ef;
            --grid: #e0d9cf;
            --ink: #1d1b19;
            --muted: #5d564f;
            --accent: #f2c100;
            --accent-strong: #c79400;
            --accent-rgb: 242, 193, 0;
            --card: #fcfbf8;
            --border: #1d1b19;
            --border-soft: #c8c1b7;
            --shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            --shadow-soft: 0 6px 14px rgba(0, 0, 0, 0.06);
            --border-width: 1px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", sans-serif;
            color: var(--ink);
            background-color: var(--bg);
            background-image:
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 140px 140px;
            padding: 24px 18px 60px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            width: 40vmax;
            height: 40vmax;
            transform: translate(-50%, -50%) scale(0.05);
            background: radial-gradient(
                circle,
                rgba(255, 255, 255, 0.95) 0%,
                rgba(var(--accent-rgb), 0.9) 10%,
                rgba(var(--accent-rgb), 0) 70%
            );
            border-radius: 50%;
            animation: pulseGlow 15s infinite ease-in-out;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.05); opacity: 1; }
            60% { opacity: 0.85; }
            100% { transform: translate(-50%, -50%) scale(5); opacity: 0; }
        }
        a { color: inherit; text-decoration: none; }
        a:hover { text-decoration: underline; }
        button, input, select { font-family: inherit; }

        .page {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 20px;
            border: var(--border-width) solid var(--border);
            background: var(--card);
            box-shadow: var(--shadow);
        }
        .page-header h1 {
            margin: 0;
            font-size: clamp(1.4rem, 1.2rem + 1.2vw, 2rem);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            text-align: center;
        }
        .filters {
            border: var(--border-width) solid var(--border);
            background: var(--card);
            padding: 14px 18px;
            box-shadow: var(--shadow-soft);
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
        }
        .filter-row label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            font-weight: 600;
        }
        .filter-row select {
            padding: 8px 10px;
            border: var(--border-width) solid var(--border);
            background: #fff;
            min-width: 160px;
        }

        .region-map-section {
            border: var(--border-width) solid var(--border);
            background: var(--card);
            padding: 18px 20px;
            box-shadow: var(--shadow-soft);
        }
        .region-map-section h2 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            font-weight: 600;
            margin: 0 0 12px 0;
        }
        .region-map-wrap {
            max-width: 560px;
            margin: 0 auto;
        }
        .region-map-wrap svg {
            width: 100%;
            height: auto;
            display: block;
        }
        .region-map-region {
            cursor: pointer;
            transition: fill 0.2s, stroke-width 0.2s;
        }
        .region-map-region:hover {
            filter: brightness(0.97);
        }
        .region-map-region.selected {
            stroke: var(--border);
            stroke-width: 2;
        }
        .region-map-region.selected {
            fill: var(--accent);
            stroke: var(--accent-strong);
            stroke-width: 2;
        }
        .region-map-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            margin-top: 12px;
            font-size: 0.8rem;
            color: var(--muted);
        }
        .region-map-legend span {
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 2px;
        }
        .region-map-legend span:hover { color: var(--ink); }
        .region-map-legend span.selected {
            background: var(--accent);
            color: var(--ink);
            font-weight: 600;
        }

        .view-section {
            border: var(--border-width) solid var(--border);
            background: var(--card);
            padding: 18px 20px;
            box-shadow: var(--shadow-soft);
        }
        .results-count {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 12px;
        }
        .exhibition-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }
        .exhibition-card {
            border: var(--border-width) solid var(--border);
            background: #fff;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: var(--shadow-soft);
        }
        .exhibition-card > a {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }
        .exhibition-card-title {
            font-weight: 600;
            font-size: 1rem;
            line-height: 1.3;
        }
        .exhibition-card-venue {
            font-size: 0.85rem;
            color: var(--muted);
        }
        .exhibition-card-dates {
            font-size: 0.8rem;
            color: var(--accent-strong);
            margin-top: auto;
        }
        .exhibition-card.is-upcoming,
        .exhibition-card.is-ended {
            opacity: 0.72;
        }
        .exhibition-card.is-upcoming .exhibition-card-title,
        .exhibition-card.is-ended .exhibition-card-title {
            color: var(--muted);
        }
        .exhibition-card-badge {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .exhibition-card-badge.on-now { color: var(--accent-strong); }
        .exhibition-card-badge.coming-soon { color: var(--muted); }
        .exhibition-card-badge.ended { color: var(--muted); }
        .region-section {
            margin-bottom: 28px;
        }
        .region-section:last-child { margin-bottom: 0; }
        .region-heading {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-soft);
        }
        .loading { color: var(--muted); }
        .empty-state { color: var(--muted); padding: 24px 0; }
        .is-hidden { display: none; }

        .page-footer {
            font-size: 0.75rem;
            color: var(--muted);
            padding-top: 12px;
            border-top: 1px solid var(--border-soft);
        }
        .page-footer a { color: var(--accent-strong); }
    </style>
</head>
<body>
    <main class="page">
        <header class="page-header">
            <h1>North of England Art Exhibitions</h1>
        </header>

        <section class="region-map-section">
            <h2 id="region-map-heading">Filter by region</h2>
            <div class="region-map-wrap" role="application" aria-labelledby="region-map-heading">
                <svg viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg" aria-label="North of England regions">
                    <g class="region-map-region" data-region="North East" id="region-north-east" aria-pressed="false" tabindex="0" role="button" title="North East (Newcastle, Gateshead)">
                        <path d="M 260 0 L 400 0 L 400 110 L 260 130 L 220 100 Z" fill="var(--grid)" stroke="var(--border-soft)" stroke-width="1"/>
                        <text x="320" y="55" font-size="14" fill="var(--muted)" text-anchor="middle">North East</text>
                    </g>
                    <g class="region-map-region" data-region="Yorkshire" id="region-yorkshire" aria-pressed="false" tabindex="0" role="button" title="Yorkshire (Leeds, Sheffield, York, Hull, Wakefield, Bradford, West Bretton)">
                        <path d="M 120 70 L 400 70 L 400 320 L 120 320 L 120 200 L 220 100 L 260 130 Z" fill="var(--grid)" stroke="var(--border-soft)" stroke-width="1"/>
                        <text x="260" y="200" font-size="14" fill="var(--muted)" text-anchor="middle">Yorkshire</text>
                    </g>
                    <g class="region-map-region" data-region="Lancashire" id="region-lancashire" aria-pressed="false" tabindex="0" role="button" title="Lancashire (Preston)">
                        <path d="M 0 0 L 120 0 L 120 85 L 0 85 Z" fill="var(--grid)" stroke="var(--border-soft)" stroke-width="1"/>
                        <text x="60" y="45" font-size="12" fill="var(--muted)" text-anchor="middle">Lancashire</text>
                    </g>
                    <g class="region-map-region" data-region="Greater Manchester" id="region-greater-manchester" aria-pressed="false" tabindex="0" role="button" title="Greater Manchester">
                        <path d="M 0 85 L 120 85 L 120 195 L 0 195 Z" fill="var(--grid)" stroke="var(--border-soft)" stroke-width="1"/>
                        <text x="60" y="138" font-size="11" fill="var(--muted)" text-anchor="middle">Manchester</text>
                    </g>
                    <g class="region-map-region" data-region="Merseyside" id="region-merseyside" aria-pressed="false" tabindex="0" role="button" title="Merseyside (Liverpool)">
                        <path d="M 0 195 L 120 195 L 120 320 L 0 320 Z" fill="var(--grid)" stroke="var(--border-soft)" stroke-width="1"/>
                        <text x="60" y="260" font-size="14" fill="var(--muted)" text-anchor="middle">Merseyside</text>
                    </g>
                </svg>
            </div>
            <div class="region-map-legend" id="region-legend" aria-hidden="true"></div>
        </section>

        <section class="filters">
            <div class="filter-row">
                <div>
                    <label for="city-select">City</label>
                    <select id="city-select">
                        <option value="">All cities</option>
                    </select>
                </div>
                <div>
                    <label for="sort-select">Sort</label>
                    <select id="sort-select">
                        <option value="ending-soon">Ending soon</option>
                        <option value="title">A–Z by title</option>
                        <option value="venue">By venue</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="view-section">
            <div class="results-count" id="results-count"></div>
            <div id="exhibition-list">
                <div class="loading">Loading exhibitions…</div>
            </div>
            <div class="empty-state is-hidden" id="empty-state">No exhibitions match the selected filters.</div>
        </section>

        <footer class="page-footer">
            <p>Listings are scraped from gallery and museum websites. Check the venue site for opening times and booking.</p>
            <p><a href="north-art-exhibitions/data/exhibitions.json">Download raw exhibitions JSON</a>.</p>
        </footer>
    </main>

    <script>
        (function () {
            const jsonUrl = "north-art-exhibitions/data/exhibitions.json";
            const citySelect = document.getElementById("city-select");
            const sortSelect = document.getElementById("sort-select");
            const listEl = document.getElementById("exhibition-list");
            const countEl = document.getElementById("results-count");
            const emptyEl = document.getElementById("empty-state");

            let rawData = [];

            function formatDate(iso) {
                if (!iso) return "—";
                const d = new Date(iso + "T12:00:00");
                if (isNaN(d.getTime())) return iso;
                return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
            }

            const CITY_TO_REGION = {
                "Manchester": "Greater Manchester",
                "Liverpool": "Merseyside",
                "Sheffield": "South Yorkshire",
                "Leeds": "West Yorkshire",
                "Wakefield": "West Yorkshire",
                "Bradford": "West Yorkshire",
                "Saltaire": "West Yorkshire",
                "West Bretton": "West Yorkshire",
                "York": "North Yorkshire",
                "Hull": "East Yorkshire",
                "Newcastle": "North East",
                "Gateshead": "North East",
                "Preston": "Lancashire"
            };
            const CITY_TO_MAP_REGION = {
                "Manchester": "Greater Manchester",
                "Liverpool": "Merseyside",
                "Sheffield": "Yorkshire",
                "Leeds": "Yorkshire",
                "Wakefield": "Yorkshire",
                "Bradford": "Yorkshire",
                "Saltaire": "Yorkshire",
                "West Bretton": "Yorkshire",
                "York": "Yorkshire",
                "Hull": "Yorkshire",
                "Newcastle": "North East",
                "Gateshead": "North East",
                "Preston": "Lancashire"
            };
            const MAP_REGIONS = ["North East", "Yorkshire", "Greater Manchester", "Merseyside", "Lancashire"];
            const REGION_ORDER = ["North East", "North Yorkshire", "East Yorkshire", "South Yorkshire", "West Yorkshire", "Greater Manchester", "Merseyside", "Lancashire"];

            let selectedMapRegions = new Set();

            function getMapRegion(item) {
                return CITY_TO_MAP_REGION[item.venue_city] || null;
            }

            function getRegion(item) {
                return CITY_TO_REGION[item.venue_city] || item.venue_city || "Other";
            }

            function dateRange(item) {
                const start = formatDate(item.start_date);
                const end = formatDate(item.end_date);
                if (start === "—" && end === "—") return "Ongoing";
                if (start === end) return start;
                return start + " – " + end;
            }

            function status(item) {
                const today = new Date().toISOString().slice(0, 10);
                const start = item.start_date || "";
                const end = item.end_date || "";
                if (start && end) {
                    if (today < start) return "coming-soon";
                    if (today > end) return "ended";
                    return "on-now";
                }
                if (start) {
                    if (today < start) return "coming-soon";
                    return "on-now";
                }
                if (end) {
                    if (today > end) return "ended";
                    return "on-now";
                }
                return "on-now";
            }

            function sortKeyEnd(item) {
                if (item.end_date) return item.end_date;
                return "9999-12-31";
            }

            function getFiltered() {
                const city = (citySelect.value || "").trim().toLowerCase();
                let list = rawData.slice();

                list = list.filter(function (item) {
                    if (status(item) === "ended") return false;
                    return true;
                });

                if (selectedMapRegions.size > 0) {
                    list = list.filter(function (item) {
                        const r = getMapRegion(item);
                        return r && selectedMapRegions.has(r);
                    });
                }
                if (city) {
                    list = list.filter(function (item) {
                        return (item.venue_city || "").toLowerCase() === city;
                    });
                }
                const sort = sortSelect.value;
                if (sort === "ending-soon") {
                    list.sort(function (a, b) {
                        return sortKeyEnd(a).localeCompare(sortKeyEnd(b));
                    });
                } else if (sort === "title") {
                    list.sort(function (a, b) {
                        return (a.exhibition_title || "").localeCompare(b.exhibition_title || "");
                    });
                } else if (sort === "venue") {
                    list.sort(function (a, b) {
                        const v = (a.venue_name || "").localeCompare(b.venue_name || "");
                        if (v !== 0) return v;
                        return (a.exhibition_title || "").localeCompare(b.exhibition_title || "");
                    });
                }
                return list;
            }

            function render() {
                const list = getFiltered();
                countEl.textContent = list.length + " exhibition" + (list.length !== 1 ? "s" : "");

                if (list.length === 0) {
                    listEl.classList.add("is-hidden");
                    emptyEl.classList.remove("is-hidden");
                    return;
                }
                emptyEl.classList.add("is-hidden");
                listEl.classList.remove("is-hidden");
                listEl.innerHTML = "";

                const byRegion = {};
                list.forEach(function (item) {
                    const r = getRegion(item);
                    if (!byRegion[r]) byRegion[r] = [];
                    byRegion[r].push(item);
                });
                const orderedRegions = REGION_ORDER.filter(function (r) { return byRegion[r]; });
                const otherRegions = Object.keys(byRegion).filter(function (r) { return REGION_ORDER.indexOf(r) === -1; }).sort();
                orderedRegions.push.apply(orderedRegions, otherRegions);

                orderedRegions.forEach(function (region) {
                    const section = document.createElement("div");
                    section.className = "region-section";
                    const heading = document.createElement("h2");
                    heading.className = "region-heading";
                    heading.textContent = region;
                    section.appendChild(heading);
                    const grid = document.createElement("div");
                    grid.className = "exhibition-grid";
                    byRegion[region].forEach(function (item) {
                        const st = status(item);
                        const card = document.createElement("div");
                        card.className = "exhibition-card" + (st === "on-now" ? "" : " is-" + (st === "coming-soon" ? "upcoming" : "ended"));
                        const link = document.createElement("a");
                        link.href = item.detail_page_url || "#";
                        link.target = "_blank";
                        link.rel = "noopener";

                        const badge = document.createElement("div");
                        badge.className = "exhibition-card-badge " + (st === "on-now" ? "on-now" : st === "coming-soon" ? "coming-soon" : "ended");
                        badge.textContent = st === "on-now" ? "On now" : st === "coming-soon" ? "Coming soon" : "Ended";

                        const title = document.createElement("div");
                        title.className = "exhibition-card-title";
                        title.textContent = item.exhibition_title || "Untitled";

                        const venue = document.createElement("div");
                        venue.className = "exhibition-card-venue";
                        venue.textContent = (item.venue_name || "") + (item.venue_city ? ", " + item.venue_city : "");

                        const dates = document.createElement("div");
                        dates.className = "exhibition-card-dates";
                        dates.textContent = dateRange(item);

                        link.appendChild(badge);
                        link.appendChild(title);
                        link.appendChild(venue);
                        link.appendChild(dates);
                        card.appendChild(link);
                        grid.appendChild(card);
                    });
                    section.appendChild(grid);
                    listEl.appendChild(section);
                });
            }

            function updateMapSelection() {
                MAP_REGIONS.forEach(function (name) {
                    const g = document.getElementById("region-" + name.toLowerCase().replace(/\s+/g, "-"));
                    const legendSpan = document.querySelector(".region-map-legend [data-region=\"" + name + "\"]");
                    if (g) {
                        g.classList.toggle("selected", selectedMapRegions.has(name));
                        g.setAttribute("aria-pressed", selectedMapRegions.has(name) ? "true" : "false");
                    }
                    if (legendSpan) legendSpan.classList.toggle("selected", selectedMapRegions.has(name));
                });
            }

            function toggleRegion(regionName) {
                if (selectedMapRegions.has(regionName)) {
                    selectedMapRegions.delete(regionName);
                } else {
                    selectedMapRegions.add(regionName);
                }
                updateMapSelection();
                render();
            }

            MAP_REGIONS.forEach(function (name) {
                const g = document.getElementById("region-" + name.toLowerCase().replace(/\s+/g, "-"));
                if (g) {
                    g.addEventListener("click", function () { toggleRegion(name); });
                    g.addEventListener("keydown", function (e) {
                        if (e.key === "Enter" || e.key === " ") {
                            e.preventDefault();
                            toggleRegion(name);
                        }
                    });
                }
                const span = document.createElement("span");
                span.setAttribute("data-region", name);
                span.setAttribute("tabindex", "0");
                span.setAttribute("role", "button");
                span.textContent = name;
                span.addEventListener("click", function () { toggleRegion(name); });
                span.addEventListener("keydown", function (e) {
                    if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        toggleRegion(name);
                    }
                });
                document.getElementById("region-legend").appendChild(span);
            });

            citySelect.addEventListener("change", render);
            sortSelect.addEventListener("change", render);

            fetch(jsonUrl + "?t=" + Date.now(), { cache: "no-store" })
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    rawData = Array.isArray(data) ? data : [];
                    const cities = [];
                    const seen = new Set();
                    rawData.forEach(function (item) {
                        const c = (item.venue_city || "").trim();
                        if (c && !seen.has(c)) {
                            seen.add(c);
                            cities.push(c);
                        }
                    });
                    cities.sort();
                    cities.forEach(function (c) {
                        const opt = document.createElement("option");
                        opt.value = c;
                        opt.textContent = c;
                        citySelect.appendChild(opt);
                    });
                    render();
                })
                .catch(function (err) {
                    listEl.innerHTML = "<p class=\"empty-state\">Could not load exhibitions. " + (err.message || "Network error") + ".</p>";
                    listEl.classList.remove("is-hidden");
                    emptyEl.classList.add("is-hidden");
                });
        })();
    </script>
</body>
</html>
