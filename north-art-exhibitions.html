<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>North of England Art Exhibitions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f3ef;
            --grid: #e0d9cf;
            --ink: #1d1b19;
            --muted: #5d564f;
            --accent: #f2c100;
            --accent-strong: #c79400;
            --accent-rgb: 242, 193, 0;
            --card: #fcfbf8;
            --border: #1d1b19;
            --border-soft: #c8c1b7;
            --shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            --shadow-soft: 0 6px 14px rgba(0, 0, 0, 0.06);
            --border-width: 1px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", sans-serif;
            color: var(--ink);
            background-color: var(--bg);
            background-image:
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 140px 140px;
            padding: 24px 18px 60px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            width: 40vmax;
            height: 40vmax;
            transform: translate(-50%, -50%) scale(0.05);
            background: radial-gradient(
                circle,
                rgba(255, 255, 255, 0.95) 0%,
                rgba(var(--accent-rgb), 0.9) 10%,
                rgba(var(--accent-rgb), 0) 70%
            );
            border-radius: 50%;
            animation: pulseGlow 15s infinite ease-in-out;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.05); opacity: 1; }
            60% { opacity: 0.85; }
            100% { transform: translate(-50%, -50%) scale(5); opacity: 0; }
        }
        a { color: inherit; text-decoration: none; }
        a:hover { text-decoration: underline; }
        button, input, select { font-family: inherit; }

        .page {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 20px;
            border: var(--border-width) solid var(--border);
            background: var(--card);
            box-shadow: var(--shadow);
        }
        .page-header h1 {
            margin: 0;
            font-size: clamp(1.4rem, 1.2rem + 1.2vw, 2rem);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            text-align: center;
        }
        .page-subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: var(--muted);
            margin-top: 4px;
        }

        .filters {
            border: var(--border-width) solid var(--border);
            background: var(--card);
            padding: 14px 18px;
            box-shadow: var(--shadow-soft);
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
        }
        .filter-row label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            font-weight: 600;
        }
        .filter-row select {
            padding: 8px 10px;
            border: var(--border-width) solid var(--border);
            background: #fff;
            min-width: 160px;
        }

        .view-section {
            border: var(--border-width) solid var(--border);
            background: var(--card);
            padding: 18px 20px;
            box-shadow: var(--shadow-soft);
        }
        .results-count {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 12px;
        }
        .exhibition-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }
        .exhibition-card {
            border: var(--border-width) solid var(--border);
            background: #fff;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: var(--shadow-soft);
        }
        .exhibition-card > a {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }
        .exhibition-card-title {
            font-weight: 600;
            font-size: 1rem;
            line-height: 1.3;
        }
        .exhibition-card-venue {
            font-size: 0.85rem;
            color: var(--muted);
        }
        .exhibition-card-dates {
            font-size: 0.8rem;
            color: var(--accent-strong);
            margin-top: auto;
        }
        .loading { color: var(--muted); }
        .empty-state { color: var(--muted); padding: 24px 0; }
        .is-hidden { display: none; }

        .page-footer {
            font-size: 0.75rem;
            color: var(--muted);
            padding-top: 12px;
            border-top: 1px solid var(--border-soft);
        }
        .page-footer a { color: var(--accent-strong); }
    </style>
</head>
<body>
    <main class="page">
        <header class="page-header">
            <div>
                <h1>North of England Art Exhibitions</h1>
                <p class="page-subtitle">Worth a visit from Manchester</p>
            </div>
        </header>

        <section class="filters">
            <div class="filter-row">
                <div>
                    <label for="city-select">City</label>
                    <select id="city-select">
                        <option value="">All cities</option>
                    </select>
                </div>
                <div>
                    <label for="sort-select">Sort</label>
                    <select id="sort-select">
                        <option value="ending-soon">Ending soon</option>
                        <option value="title">A–Z by title</option>
                        <option value="venue">By venue</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="view-section">
            <div class="results-count" id="results-count"></div>
            <div id="exhibition-list">
                <div class="loading">Loading exhibitions…</div>
            </div>
            <div class="empty-state is-hidden" id="empty-state">No exhibitions match the selected city.</div>
        </section>

        <footer class="page-footer">
            <p>Listings are scraped from gallery and museum websites. Check the venue site for opening times and booking.</p>
            <p><a href="north-art-exhibitions/data/exhibitions.json">Download raw exhibitions JSON</a>.</p>
        </footer>
    </main>

    <script>
        (function () {
            const jsonUrl = "north-art-exhibitions/data/exhibitions.json";
            const citySelect = document.getElementById("city-select");
            const sortSelect = document.getElementById("sort-select");
            const listEl = document.getElementById("exhibition-list");
            const countEl = document.getElementById("results-count");
            const emptyEl = document.getElementById("empty-state");

            let rawData = [];

            function formatDate(iso) {
                if (!iso) return "—";
                const d = new Date(iso + "T12:00:00");
                if (isNaN(d.getTime())) return iso;
                return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
            }

            function dateRange(item) {
                const start = formatDate(item.start_date);
                const end = formatDate(item.end_date);
                if (start === "—" && end === "—") return "Ongoing";
                if (start === end) return start;
                return start + " – " + end;
            }

            function sortKeyEnd(item) {
                if (item.end_date) return item.end_date;
                return "9999-12-31";
            }

            function getFiltered() {
                const city = (citySelect.value || "").trim().toLowerCase();
                let list = rawData.slice();
                if (city) {
                    list = list.filter(function (item) {
                        return (item.venue_city || "").toLowerCase() === city;
                    });
                }
                const sort = sortSelect.value;
                if (sort === "ending-soon") {
                    list.sort(function (a, b) {
                        return sortKeyEnd(a).localeCompare(sortKeyEnd(b));
                    });
                } else if (sort === "title") {
                    list.sort(function (a, b) {
                        return (a.exhibition_title || "").localeCompare(b.exhibition_title || "");
                    });
                } else if (sort === "venue") {
                    list.sort(function (a, b) {
                        const v = (a.venue_name || "").localeCompare(b.venue_name || "");
                        if (v !== 0) return v;
                        return (a.exhibition_title || "").localeCompare(b.exhibition_title || "");
                    });
                }
                return list;
            }

            function render() {
                const list = getFiltered();
                countEl.textContent = list.length + " exhibition" + (list.length !== 1 ? "s" : "");

                if (list.length === 0) {
                    listEl.classList.add("is-hidden");
                    emptyEl.classList.remove("is-hidden");
                    return;
                }
                emptyEl.classList.add("is-hidden");
                listEl.classList.remove("is-hidden");
                listEl.innerHTML = "";

                const grid = document.createElement("div");
                grid.className = "exhibition-grid";

                list.forEach(function (item) {
                    const card = document.createElement("div");
                    card.className = "exhibition-card";
                    const link = document.createElement("a");
                    link.href = item.detail_page_url || "#";
                    link.target = "_blank";
                    link.rel = "noopener";

                    const title = document.createElement("div");
                    title.className = "exhibition-card-title";
                    title.textContent = item.exhibition_title || "Untitled";

                    const venue = document.createElement("div");
                    venue.className = "exhibition-card-venue";
                    venue.textContent = (item.venue_name || "") + (item.venue_city ? ", " + item.venue_city : "");

                    const dates = document.createElement("div");
                    dates.className = "exhibition-card-dates";
                    dates.textContent = dateRange(item);

                    link.appendChild(title);
                    link.appendChild(venue);
                    link.appendChild(dates);
                    card.appendChild(link);
                    grid.appendChild(card);
                });

                listEl.appendChild(grid);
            }

            citySelect.addEventListener("change", render);
            sortSelect.addEventListener("change", render);

            fetch(jsonUrl + "?t=" + Date.now(), { cache: "no-store" })
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    rawData = Array.isArray(data) ? data : [];
                    const cities = [];
                    const seen = new Set();
                    rawData.forEach(function (item) {
                        const c = (item.venue_city || "").trim();
                        if (c && !seen.has(c)) {
                            seen.add(c);
                            cities.push(c);
                        }
                    });
                    cities.sort();
                    cities.forEach(function (c) {
                        const opt = document.createElement("option");
                        opt.value = c;
                        opt.textContent = c;
                        citySelect.appendChild(opt);
                    });
                    render();
                })
                .catch(function (err) {
                    listEl.innerHTML = "<p class=\"empty-state\">Could not load exhibitions. " + (err.message || "Network error") + ".</p>";
                    listEl.classList.remove("is-hidden");
                    emptyEl.classList.add("is-hidden");
                });
        })();
    </script>
</body>
</html>
