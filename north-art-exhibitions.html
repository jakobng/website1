<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>North of England Art Exhibitions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f3ef;
            --grid: #e0d9cf;
            --ink: #1d1b19;
            --muted: #5d564f;
            --accent: #f2c100;
            --accent-strong: #c79400;
            --accent-rgb: 242, 193, 0;
            --card: #fcfbf8;
            --border: #1d1b19;
            --border-soft: #c8c1b7;
            --shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            --shadow-soft: 0 6px 14px rgba(0, 0, 0, 0.06);
            --border-width: 1px;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", sans-serif;
            color: var(--ink);
            background-color: var(--bg);
            background-image:
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 140px 140px;
            padding: 24px 18px 60px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            width: 40vmax;
            height: 40vmax;
            transform: translate(-50%, -50%) scale(0.05);
            background: radial-gradient(
                circle,
                rgba(255, 255, 255, 0.95) 0%,
                rgba(var(--accent-rgb), 0.9) 10%,
                rgba(var(--accent-rgb), 0) 70%
            );
            border-radius: 50%;
            animation: pulseGlow 15s infinite ease-in-out;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.05); opacity: 1; }
            60% { opacity: 0.85; }
            100% { transform: translate(-50%, -50%) scale(5); opacity: 0; }
        }
        a { color: inherit; text-decoration: none; }
        a:hover { text-decoration: underline; }
        button, input, select { font-family: inherit; }

        .page {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 20px;
            border: var(--border-width) solid var(--border);
            background: var(--card);
            box-shadow: var(--shadow);
        }
        .page-header h1 {
            margin: 0;
            font-size: clamp(1.4rem, 1.2rem + 1.2vw, 2rem);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            text-align: center;
        }
        .region-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px;
        }
        .region-card {
            border: var(--border-width) solid var(--border);
            background: var(--card);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
        }
        .region-card-header {
            padding: 18px 20px;
            font-weight: 600;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: #fff;
            border-bottom: var(--border-width) solid transparent;
        }
        .region-card-header:hover { background: var(--bg); }
        .region-card.is-open .region-card-header { border-bottom-color: var(--border-soft); }
        .region-card-header .region-chevron {
            font-size: 0.75rem;
            color: var(--muted);
            transition: transform 0.2s ease;
        }
        .region-card.is-open .region-chevron { transform: rotate(180deg); }
        .region-card-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .region-card.is-open .region-card-list { max-height: 1200px; }
        .region-card-list-inner {
            padding: 12px 16px 16px;
            background: var(--bg);
        }
        .region-exhibition-item {
            display: block;
            padding: 10px 12px;
            margin-bottom: 6px;
            background: #fff;
            border: var(--border-width) solid var(--border-soft);
            font-size: 0.9rem;
            color: inherit;
            text-decoration: none;
        }
        .region-exhibition-item:hover { text-decoration: underline; border-color: var(--accent-strong); }
        .region-exhibition-item:last-child { margin-bottom: 0; }
        .region-exhibition-title { font-weight: 500; }
        .region-exhibition-meta { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
        .region-view-all {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 14px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
            background: var(--accent);
            color: var(--ink);
            border: var(--border-width) solid var(--border);
        }
        .region-view-all:hover { background: var(--accent-strong); text-decoration: none; }

        .view-section {
            border: var(--border-width) solid var(--border);
            background: var(--card);
            padding: 18px 20px;
            box-shadow: var(--shadow-soft);
        }
        .region-detail-view { display: none; }
        .region-detail-view.is-active { display: block; }
        .region-detail-back {
            display: inline-block;
            margin-bottom: 18px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--accent-strong);
        }
        .region-detail-back:hover { text-decoration: underline; }
        .region-detail-heading {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            font-weight: 600;
            margin: 0 0 16px 0;
        }
        .detail-exhibition-list { display: flex; flex-direction: column; gap: 20px; }
        .detail-exhibition-card {
            border: var(--border-width) solid var(--border);
            background: #fff;
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            display: grid;
            grid-template-columns: minmax(180px, 280px) 1fr;
            gap: 0;
            color: inherit;
            text-decoration: none;
        }
        @media (max-width: 560px) {
            .detail-exhibition-card { grid-template-columns: 1fr; }
        }
        .detail-exhibition-card:hover .detail-exhibition-title { text-decoration: underline; }
        .detail-exhibition-image-wrap {
            background: var(--grid);
            min-height: 160px;
            position: relative;
        }
        .detail-exhibition-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            min-height: 180px;
        }
        .detail-exhibition-image-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .detail-exhibition-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 8px; }
        .detail-exhibition-badge { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
        .detail-exhibition-badge.on-now { color: var(--accent-strong); }
        .detail-exhibition-badge.coming-soon { color: var(--muted); }
        .detail-exhibition-title { font-weight: 600; font-size: 1.1rem; line-height: 1.3; }
        .detail-exhibition-venue { font-size: 0.85rem; color: var(--muted); }
        .detail-exhibition-dates { font-size: 0.8rem; color: var(--accent-strong); }
        .detail-exhibition-description { font-size: 0.9rem; line-height: 1.5; margin-top: 4px; }
        .detail-exhibition-card.is-upcoming .detail-exhibition-title,
        .detail-exhibition-card.is-ended .detail-exhibition-title { color: var(--muted); }
        .home-view { display: none; }
        .home-view.is-active { display: block; }

        .loading { color: var(--muted); }
        .empty-state { color: var(--muted); padding: 24px 0; }
        .is-hidden { display: none; }

        .page-footer {
            font-size: 0.75rem;
            color: var(--muted);
            padding-top: 12px;
            border-top: 1px solid var(--border-soft);
        }
        .page-footer a { color: var(--accent-strong); }
    </style>
</head>
<body>
    <main class="page">
        <header class="page-header">
            <h1>North of England Art Exhibitions</h1>
        </header>

        <section class="view-section">
            <div id="home-view" class="home-view is-active">
                <div class="loading" id="home-loading">Loading exhibitions…</div>
                <div id="region-grid" class="region-grid is-hidden"></div>
            </div>
            <div id="region-detail-view" class="region-detail-view">
                <a href="#" id="region-detail-back" class="region-detail-back">← All regions</a>
                <h2 id="region-detail-heading" class="region-detail-heading"></h2>
                <div id="region-detail-list" class="detail-exhibition-list"></div>
            </div>
        </section>

        <footer class="page-footer">
            <p>Listings are scraped from gallery and museum websites. Check the venue site for opening times and booking.</p>
            <p><a href="north-art-exhibitions/data/exhibitions.json">Download raw exhibitions JSON</a>.</p>
        </footer>
    </main>

    <script>
        (function () {
            const jsonUrl = "north-art-exhibitions/data/exhibitions.json";
            const CITY_TO_MAP_REGION = {
                "Manchester": "Greater Manchester",
                "Liverpool": "Merseyside",
                "Sheffield": "Yorkshire",
                "Leeds": "Yorkshire",
                "Wakefield": "Yorkshire",
                "Bradford": "Yorkshire",
                "Saltaire": "Yorkshire",
                "West Bretton": "Yorkshire",
                "York": "Yorkshire",
                "Hull": "Yorkshire",
                "Newcastle": "North East",
                "Gateshead": "North East",
                "Preston": "Lancashire"
            };
            const MAP_REGIONS = ["North East", "Yorkshire", "Greater Manchester", "Merseyside", "Lancashire"];

            let rawData = [];
            const homeView = document.getElementById("home-view");
            const homeLoading = document.getElementById("home-loading");
            const regionGrid = document.getElementById("region-grid");
            const regionDetailView = document.getElementById("region-detail-view");
            const regionDetailBack = document.getElementById("region-detail-back");
            const regionDetailHeading = document.getElementById("region-detail-heading");
            const regionDetailList = document.getElementById("region-detail-list");

            function formatDate(iso) {
                if (!iso) return "—";
                const d = new Date(iso + "T12:00:00");
                if (isNaN(d.getTime())) return iso;
                return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
            }

            function getMapRegion(item) {
                return CITY_TO_MAP_REGION[item.venue_city] || null;
            }

            function dateRange(item) {
                const start = formatDate(item.start_date);
                const end = formatDate(item.end_date);
                if (start === "—" && end === "—") return "Ongoing";
                if (start === end) return start;
                return start + " – " + end;
            }

            function status(item) {
                const today = new Date().toISOString().slice(0, 10);
                const start = item.start_date || "";
                const end = item.end_date || "";
                if (start && end) {
                    if (today < start) return "coming-soon";
                    if (today > end) return "ended";
                    return "on-now";
                }
                if (start) { if (today < start) return "coming-soon"; return "on-now"; }
                if (end) { if (today > end) return "ended"; return "on-now"; }
                return "on-now";
            }

            function sortKeyEnd(item) {
                if (item.end_date) return item.end_date;
                return "9999-12-31";
            }

            function getActiveExhibitions() {
                return rawData.filter(function (item) { return status(item) !== "ended"; });
            }

            function getByMapRegion() {
                const list = getActiveExhibitions();
                const byRegion = {};
                list.forEach(function (item) {
                    const r = getMapRegion(item);
                    if (!r) return;
                    if (!byRegion[r]) byRegion[r] = [];
                    byRegion[r].push(item);
                });
                MAP_REGIONS.forEach(function (r) {
                    if (byRegion[r]) {
                        byRegion[r].sort(function (a, b) {
                            return sortKeyEnd(a).localeCompare(sortKeyEnd(b));
                        });
                    }
                });
                return byRegion;
            }

            function slug(name) {
                return name.replace(/\s+/g, "-").toLowerCase();
            }

            function showHome() {
                homeView.classList.add("is-active");
                regionDetailView.classList.remove("is-active");
                window.location.hash = "";
            }

            function showRegionDetail(regionName) {
                homeView.classList.remove("is-active");
                regionDetailView.classList.add("is-active");
                regionDetailHeading.textContent = regionName;
                const byRegion = getByMapRegion();
                const list = byRegion[regionName] || [];
                regionDetailList.innerHTML = "";

                list.forEach(function (item) {
                    const st = status(item);
                    const link = document.createElement("a");
                    link.href = item.detail_page_url || "#";
                    link.target = "_blank";
                    link.rel = "noopener";
                    link.className = "detail-exhibition-card" + (st === "on-now" ? "" : " is-" + (st === "coming-soon" ? "upcoming" : "ended"));

                    const imageWrap = document.createElement("div");
                    imageWrap.className = "detail-exhibition-image-wrap";
                    if (item.image_url) {
                        const img = document.createElement("img");
                        img.src = item.image_url;
                        img.alt = "";
                        imageWrap.appendChild(img);
                    } else {
                        const placeholder = document.createElement("div");
                        placeholder.className = "detail-exhibition-image-placeholder";
                        placeholder.textContent = "No image";
                        imageWrap.appendChild(placeholder);
                    }

                    const body = document.createElement("div");
                    body.className = "detail-exhibition-body";
                    const badge = document.createElement("div");
                    badge.className = "detail-exhibition-badge " + (st === "on-now" ? "on-now" : st === "coming-soon" ? "coming-soon" : "ended");
                    badge.textContent = st === "on-now" ? "On now" : st === "coming-soon" ? "Coming soon" : "Ended";
                    const title = document.createElement("div");
                    title.className = "detail-exhibition-title";
                    title.textContent = item.exhibition_title || "Untitled";
                    const venue = document.createElement("div");
                    venue.className = "detail-exhibition-venue";
                    venue.textContent = (item.venue_name || "") + (item.venue_city ? ", " + item.venue_city : "");
                    const dates = document.createElement("div");
                    dates.className = "detail-exhibition-dates";
                    dates.textContent = dateRange(item);
                    body.appendChild(badge);
                    body.appendChild(title);
                    body.appendChild(venue);
                    body.appendChild(dates);
                    if (item.description && (item.description + "").trim()) {
                        const desc = document.createElement("p");
                        desc.className = "detail-exhibition-description";
                        desc.textContent = (item.description + "").trim();
                        body.appendChild(desc);
                    }
                    link.appendChild(imageWrap);
                    link.appendChild(body);
                    regionDetailList.appendChild(link);
                });
            }

            function applyRoute() {
                const hash = (window.location.hash || "").replace(/^#/, "").trim();
                if (hash) {
                    const region = MAP_REGIONS.find(function (r) { return slug(r) === slug(hash); });
                    if (region) {
                        showRegionDetail(region);
                        return;
                    }
                }
                showHome();
            }

            function renderHome() {
                const byRegion = getByMapRegion();
                regionGrid.innerHTML = "";
                MAP_REGIONS.forEach(function (regionName) {
                    const list = byRegion[regionName] || [];
                    const card = document.createElement("div");
                    card.className = "region-card";
                    card.setAttribute("data-region", regionName);

                    const header = document.createElement("div");
                    header.className = "region-card-header";
                    header.setAttribute("role", "button");
                    header.setAttribute("tabindex", "0");
                    header.setAttribute("aria-expanded", "false");
                    header.innerHTML = "<span>" + regionName + "</span><span class=\"region-chevron\" aria-hidden=\"true\">▼</span>";
                    header.addEventListener("click", function () {
                        card.classList.toggle("is-open");
                        header.setAttribute("aria-expanded", card.classList.contains("is-open"));
                    });
                    header.addEventListener("keydown", function (e) {
                        if (e.key === "Enter" || e.key === " ") {
                            e.preventDefault();
                            card.classList.toggle("is-open");
                            header.setAttribute("aria-expanded", card.classList.contains("is-open"));
                        }
                    });

                    const listWrap = document.createElement("div");
                    listWrap.className = "region-card-list";
                    const listInner = document.createElement("div");
                    listInner.className = "region-card-list-inner";

                    list.slice(0, 12).forEach(function (item) {
                        const a = document.createElement("a");
                        a.href = item.detail_page_url || "#";
                        a.target = "_blank";
                        a.rel = "noopener";
                        a.className = "region-exhibition-item";
                        a.innerHTML = "<span class=\"region-exhibition-title\">" + (item.exhibition_title || "Untitled").replace(/</g, "&lt;") + "</span><span class=\"region-exhibition-meta\">" + (item.venue_name || "").replace(/</g, "&lt;") + (item.venue_city ? ", " + item.venue_city : "") + " · " + dateRange(item) + "</span>";
                        listInner.appendChild(a);
                    });

                    if (list.length > 0) {
                        const viewAll = document.createElement("a");
                        viewAll.href = "#" + slug(regionName);
                        viewAll.className = "region-view-all";
                        viewAll.textContent = "View all exhibitions (" + list.length + ")";
                        viewAll.addEventListener("click", function (e) {
                            e.preventDefault();
                            window.location.hash = slug(regionName);
                            applyRoute();
                        });
                        listInner.appendChild(viewAll);
                    }
                    listWrap.appendChild(listInner);
                    card.appendChild(header);
                    card.appendChild(listWrap);
                    regionGrid.appendChild(card);
                });

                homeLoading.classList.add("is-hidden");
                regionGrid.classList.remove("is-hidden");
            }

            regionDetailBack.addEventListener("click", function (e) {
                e.preventDefault();
                showHome();
            });
            window.addEventListener("hashchange", applyRoute);

            fetch(jsonUrl + "?t=" + Date.now(), { cache: "no-store" })
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    rawData = Array.isArray(data) ? data : [];
                    renderHome();
                    applyRoute();
                })
                .catch(function (err) {
                    homeLoading.textContent = "Could not load exhibitions. " + (err.message || "Network error") + ".";
                });
        })();
    </script>
</body>
</html>
