<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokyo Mini-Theater Showtimes</title>
    <meta name="description" content="A bilingual guide to independent and mini-theater film showtimes across Tokyo, updated from cinema listings.">
    <link rel="canonical" href="https://www.leonelki.com/tokyo-cinemas.html">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Tokyo Mini-Theater Showtimes">
    <meta property="og:description" content="A bilingual guide to independent and mini-theater film showtimes across Tokyo, updated from cinema listings.">
    <meta property="og:url" content="https://www.leonelki.com/tokyo-cinemas.html">
    <meta property="og:locale" content="ja_JP">
    <meta name="twitter:card" content="summary">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#f5f3ef">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f3ef;
            --grid: #e0d9cf;
            --ink: #1d1b19;
            --muted: #5d564f;
            --accent: #f2c100;
            --accent-strong: #c79400;
            --accent-rgb: 242, 193, 0;
            --card: #fcfbf8;
            --border: #1d1b19;
            --border-soft: #c8c1b7;
            --shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            --shadow-soft: 0 6px 14px rgba(0, 0, 0, 0.06);
            --border-width: 1px;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", sans-serif;
            color: var(--ink);
            background-color: var(--bg);
            background-image:
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 140px 140px;
            padding: 24px 18px 60px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            width: 40vmax;
            height: 40vmax;
            transform: translate(-50%, -50%) scale(0.05);
            background: radial-gradient(
                circle,
                rgba(255, 255, 255, 0.95) 0%,
                rgba(var(--accent-rgb), 0.9) 10%,
                rgba(var(--accent-rgb), 0) 70%
            );
            border-radius: 50%;
            animation: pulseGlow 15s infinite ease-in-out;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.05); opacity: 1; }
            60% { opacity: 0.85; }
            100% { transform: translate(-50%, -50%) scale(5); opacity: 0; }
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        button,
        input,
        select {
            font-family: inherit;
        }
        .page {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px 20px 20px; /* Increased top padding */
            background: transparent;
            border: none;
            box-shadow: none;
        }
        .header-left {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px; /* Increased gap */
        }
        .header-right {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        /* Mobile adjust for header */
        @media (max-width: 640px) {
            .page-header {
                flex-direction: column;
                gap: 16px;
                padding-top: 24px;
            }
            .header-left {
                position: relative;
                left: auto;
                top: auto;
                transform: none;
                align-items: center;
                order: 2;
                margin-bottom: 0;
            }
            .header-right {
                position: relative;
                right: auto;
                top: auto;
                transform: none;
                order: 3;
            }
            h1 { order: 1; }
        }
        .lang-toggle {
            display: inline-flex;
            gap: 8px; /* Spacing between buttons */
            background: rgba(255,255,255,0.6);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-soft);
        }
        .lang-btn {
            background: none;
            border: none;
            font-size: 0.85rem; /* Larger font */
            font-weight: 700;   /* Bolder */
            color: var(--muted);
            cursor: pointer;
            padding: 2px 4px;
            text-transform: uppercase;
            transition: color 0.2s;
        }
        .lang-btn.is-active {
            color: var(--ink);
            text-decoration: underline;
            text-underline-offset: 4px;
        }
        .site-credit {
            font-size: 0.7rem;
            letter-spacing: 0.04em;
            color: var(--muted);
        }
        .ig-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            color: var(--accent-strong);
        }
        .install-btn {
            border: var(--border-width) solid var(--border);
            background: #fff;
            padding: 6px 10px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            cursor: pointer;
        }
        .install-btn:hover {
            background: var(--bg);
        }
        .ig-link svg {
            width: 22px;
            height: 22px;
        }
        .ig-link:hover {
            text-decoration: underline;
        }
        h1 {
            margin: 0;
            text-align: center;
            font-size: clamp(1.8rem, 1.4rem + 1.2vw, 2.5rem);
            text-transform: uppercase;
            letter-spacing: 0.16em;
            cursor: pointer;
            font-weight: 700;
            line-height: 1.1;
        }
        /* --- NEW TABS --- */
        .view-tabs {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-soft);
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 12px 16px;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
        }
        .tab-btn::after {
            content: "";
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .tab-btn.is-active {
            color: var(--ink);
        }
        .tab-btn.is-active::after {
            opacity: 1;
        }
        .controls-section {
            background: var(--card);
            border: var(--border-width) solid var(--border);
            box-shadow: var(--shadow-soft);
            padding: 12px;
            margin-bottom: 18px;
        }
        .primary-controls {
            display: grid;
            grid-template-columns: minmax(240px, 1fr) minmax(150px, 0.34fr) minmax(280px, 0.62fr);
            gap: 10px;
            align-items: end;
        }
        .search-wrapper,
        .date-wrapper,
        .sort-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .sort-controls {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
            align-items: stretch;
        }
        .near-me-btn {
            height: 42px;
            border: var(--border-width) solid var(--border);
            background: #fff;
            color: var(--ink);
            cursor: pointer;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            line-height: 1;
            padding: 0 12px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .near-me-btn:hover,
        .near-me-btn.is-active {
            background: var(--accent);
        }
        .advanced-filters {
            display: block;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-soft);
            animation: none;
        }
        .advanced-filters.is-expanded {
            display: block;
        }
        .advanced-grid {
            display: grid;
            grid-template-columns: minmax(130px, 0.8fr) minmax(180px, 1fr) minmax(170px, 0.9fr) minmax(160px, 0.8fr) auto;
            gap: 10px;
            align-items: end;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .checkbox-group {
            flex-direction: row;
            align-items: center;
            min-height: 42px;
            gap: 8px;
            padding: 0 10px;
            background: #fff;
            border: var(--border-width) solid var(--border-soft);
        }
        .checkbox-group input {
            accent-color: var(--accent-strong);
            margin: 0;
        }
        .checkbox-group label {
            cursor: pointer;
            line-height: 1.2;
        }
        .clear-btn-wrapper {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            min-height: 42px;
        }
        label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            font-weight: 700;
        }
        input[type="search"],
        select {
            height: 42px;
            padding: 0 12px;
            border: var(--border-width) solid var(--border-soft);
            background: #fff;
            width: 100%;
            font-size: 0.9rem;
        }
        input[type="search"]:focus,
        select:focus {
            outline: 2px solid var(--accent);
            border-color: var(--accent);
        }
        .link-btn {
            min-height: 42px;
            border: var(--border-width) solid var(--border);
            background: #fff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.7rem;
            cursor: pointer;
            color: var(--ink);
            padding: 8px 12px;
        }
        .link-btn:hover {
            background: var(--bg);
        }
        .location-status {
            font-size: 0.72rem;
            color: var(--muted);
            min-height: 1em;
            margin-top: 4px;
        }
        .distance-label {
            color: var(--muted);
            font-size: 0.78em;
            font-weight: 500;
            margin-left: 6px;
            white-space: nowrap;
        }
        .showtime-details {
            width: 100%;
        }
        .showtime-details summary {
            cursor: pointer;
            color: var(--accent-strong);
            font-size: 0.78rem;
            font-weight: 700;
            padding: 6px 0;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .showtime-details-row {
            margin-top: 6px;
        }

        .view-section {
            border: var(--border-width) solid var(--border);
            background: var(--card);
            padding: 18px 20px;
            box-shadow: var(--shadow-soft);
        }
        .is-hidden {
            display: none;
        }
        .region-block {
            padding: 16px 0;
            border-top: var(--border-width) solid var(--border-soft);
        }
        .region-block:first-child {
            border-top: none;
            padding-top: 0;
        }
        .region-title {
            margin: 0 0 12px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
        .cinema-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
        }
        .cinema-card {
            border: var(--border-width) solid var(--border);
            background: #fff;
            padding: 14px;
            text-align: left;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: var(--shadow-soft);
        }
        .cinema-card-title {
            font-weight: 600;
        }
        .cinema-card-meta {
            font-size: 0.8rem;
            color: var(--muted);
        }
        .cinema-showtimes-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            border-bottom: var(--border-width) solid var(--border-soft);
            padding-bottom: 12px;
            margin-bottom: 12px;
        }
        .back-btn {
            border: var(--border-width) solid var(--border);
            background: #fff;
            padding: 8px 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }
        .cinema-title {
            margin: 0;
            font-size: 1.4rem;
        }
        .cinema-title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .cinema-meta {
            color: var(--muted);
            font-size: 0.85rem;
        }
        .date-block {
            padding: 14px 0;
            border-top: var(--border-width) solid var(--border-soft);
        }
        .date-block:first-child {
            border-top: none;
            padding-top: 0;
        }
        .date-title {
            margin: 0 0 12px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-weight: 600;
            color: var(--accent-strong);
            padding-bottom: 6px;
            border-bottom: 2px solid var(--accent);
        }
        .cinema-film {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
            gap: 12px;
            padding: 12px 0;
            border-top: var(--border-width) solid var(--border-soft);
        }
        .cinema-film:first-child {
            border-top: none;
            padding-top: 0;
        }
        .cinema-film-title {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            font-weight: 600;
        }
        .film-link {
            border: var(--border-width) solid var(--border);
            padding: 4px 8px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            background: #fff;
        }
        .cinema-map-link {
            margin-top: 2px;
        }
        .cinema-film-meta {
            color: var(--muted);
            font-size: 0.8rem;
            margin-top: 4px;
        }
        .time-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .time-chip {
            border: var(--border-width) solid var(--border);
            padding: 6px 10px;
            font-size: 0.8rem;
            background: #fff;
        }
        .time-chip.is-bookable {
            background: #fff;
            border-color: var(--border);
            color: var(--ink);
        }
        .film-view-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border-bottom: var(--border-width) solid var(--border-soft);
            padding-bottom: 12px;
            margin-bottom: 12px;
        }
        .results-count {
            font-weight: 600;
        }
        .results-meta {
            color: var(--muted);
            font-size: 0.85rem;
        }
        .film-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .film-card {
            border: var(--border-width) solid var(--border);
            background: #fff;
            padding: 16px;
            display: grid;
            grid-template-columns: 160px minmax(0, 1fr);
            gap: 16px;
            box-shadow: var(--shadow);
        }
        .film-poster {
            width: 160px;
            aspect-ratio: 2 / 3;
            border: var(--border-width) solid var(--border-soft);
            background: #eae4da;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.75rem;
            color: var(--muted);
            padding: 10px;
        }
        .film-body {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .film-title {
            margin: 0;
            font-size: 1.3rem;
        }
        .film-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .film-meta {
            color: var(--muted);
            font-size: 0.85rem;
        }
        .film-blurb {
            margin: 0;
            color: var(--muted);
        }
        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tag {
            border: var(--border-width) solid var(--border-soft);
            padding: 4px 8px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .showing-row {
            display: grid;
            grid-template-columns: 160px minmax(0, 1fr);
            gap: 12px;
            align-items: flex-start;
        }
        .cinema-name {
            font-weight: 600;
        }
        .loading,
        .empty-state {
            text-align: center;
            padding: 20px;
            border: 1px dashed var(--border-soft);
            color: var(--muted);
        }
        .page-footer {
            text-align: center;
            font-size: 0.85rem;
            color: var(--muted);
            border-top: var(--border-width) solid var(--border-soft);
            padding-top: 16px;
        }
        @media (max-width: 1000px) {
            .page-header {
                grid-template-columns: minmax(0, 1fr);
                text-align: center;
            }
            .header-left,
            .header-right {
                justify-content: center;
            }
            .header-left {
                align-items: center;
            }
            .primary-controls {
                grid-template-columns: minmax(0, 1fr) minmax(140px, 0.5fr);
            }
            .search-wrapper {
                grid-column: 1 / -1;
            }
            .sort-wrapper {
                grid-column: 1 / -1;
            }
            .advanced-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .filter-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .filter-grid-wide {
                grid-template-columns: minmax(0, 1fr);
            }
            .cinema-showtimes-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .film-card {
                grid-template-columns: minmax(0, 1fr);
            }
            .film-poster {
                width: 100%;
                max-width: 220px;
            }
            .showing-row {
                grid-template-columns: minmax(0, 1fr);
            }
            .cinema-film {
                grid-template-columns: minmax(0, 1fr);
            }
        }
        @media (max-width: 640px) {
            body {
                padding: 18px 12px 44px;
            }
            .controls-section {
                padding: 10px;
            }
            .primary-controls,
            .advanced-grid {
                grid-template-columns: minmax(0, 1fr);
            }
            .search-wrapper {
                grid-column: auto;
            }
            .sort-controls {
                grid-template-columns: minmax(0, 1fr);
            }
            .near-me-btn {
                width: 100%;
            }
            .filter-grid {
                grid-template-columns: minmax(0, 1fr);
            }
            h1 {
                letter-spacing: 0.1em;
            }
            .advanced-filters {
                display: block;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
            body::before {
                animation: none;
                opacity: 0.25;
                transform: translate(-50%, -50%) scale(2);
            }
        }
        /* Map Drawer Styles */
        /* Hide the old summary header since the button is now in the toolbar */
        @media (max-width: 1000px) {
            .top-row-grid {
                grid-template-columns: minmax(0, 1fr);
            }
        }
        @media (max-width: 600px) {
        }
        /* Merged Region Styles */
        /* Inactive Regions */
        /* Active Regions */
        /* Map Labels */
        /* Reset transform origin for each group is hard in CSS without individual IDs.
           Let's just use color change. */
</style>
</head>
<body>
    <main class="page">
        <header class="page-header">
            <div class="header-left">
                <h1 id="site-title"></h1>
                <div class="site-credit" id="site-credit"></div>
                <div class="lang-toggle" role="group" aria-label="Language">
                    <button class="lang-btn" data-lang="ja" type="button">JP</button>
                    <button class="lang-btn" data-lang="en" type="button">EN</button>
                </div>
            </div>
            <div class="header-right">
                <button class="install-btn is-hidden" type="button" id="install-app-btn"></button>
                <a class="ig-link" href="https://www.instagram.com/tokyominitheater/" target="_blank" rel="noopener" aria-label="Tokyo Mini-Theater Instagram">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <rect x="3" y="3" width="18" height="18" rx="5" ry="5" fill="none" stroke="currentColor" stroke-width="2"></rect>
                        <circle cx="12" cy="12" r="4.2" fill="none" stroke="currentColor" stroke-width="2"></circle>
                        <circle cx="17.2" cy="6.8" r="1.4" fill="currentColor"></circle>
                    </svg>
                </a>
            </div>
        </header>
        <nav class="view-tabs">
            <button class="tab-btn" data-view="cinema" type="button" id="view-cinema-btn"></button>
            <button class="tab-btn is-active" data-view="film" type="button" id="view-film-btn"></button>
        </nav>
        <section class="controls-section">
            <div class="primary-controls">
                <div class="search-wrapper">
                    <label for="search-input" id="search-label"></label>
                    <input id="search-input" type="search">
                </div>
                <div class="date-wrapper">
                    <label for="date-select" id="date-label"></label>
                    <select id="date-select"></select>
                </div>
                <div class="sort-wrapper" id="sort-filter-container">
                    <label for="sort-select" id="sort-label"></label>
                    <div class="sort-controls">
                        <select id="sort-select"></select>
                        <button class="near-me-btn" type="button" id="near-me-btn"></button>
                    </div>
                    <div class="location-status" id="location-status" aria-live="polite"></div>
                </div>
            </div>
            <div class="advanced-filters" id="filters-content">
                <div class="advanced-grid">
                    <div class="control-group">
                        <label for="time-select" id="time-label"></label>
                        <select id="time-select"></select>
                    </div>
                    <div class="control-group">
                        <label for="region-select" id="region-label"></label>
                        <select id="region-select"></select>
                    </div>
                    <div class="control-group checkbox-group">
                        <input id="english-friendly" type="checkbox">
                        <label for="english-friendly" id="english-friendly-label"></label>
                    </div>
                    <div class="control-group checkbox-group">
                        <input id="doc-only" type="checkbox">

            function isDocumentary(showing) {
                const genres = [];
                if (Array.isArray(showing.genres)) genres.push.apply(genres, showing.genres);
                if (Array.isArray(showing.genresEn)) genres.push.apply(genres, showing.genresEn);
                return genres.some(function (genre) {
                    const value = String(genre || "").toLowerCase();
                    return value.includes("documentary") || value.includes("ドキュメンタリー");
                });
            }
            function normalizeLanguageCode(value) {
                return String(value || "").trim().toLowerCase().replace("_", "-").split("-")[0];
            }
            function hasExplicitEnglishSubtitleMarker(text) {
                return /\benglish[-\s]?subtitles?\b|\benglish[-\s]?subtitled\b|英語字幕|英文字幕|英字幕/i.test(text || "");
            }
            function hasEnglishAudioMarker(text) {
                return /\benglish[-\s]?audio\b|\benglish[-\s]?language\b|英語発音|英語音声|英語版/i.test(text || "");
            }
            function hasEnglishUnfriendlySourceMarker(text) {
                const value = String(text || "");
                if (!value) return false;
                if (/without english subtitles|no english subtitles|英語字幕なし|英文字幕なし|無英文字幕|無英字幕/i.test(value)) return true;
                if (hasExplicitEnglishSubtitleMarker(value) || hasEnglishAudioMarker(value)) return false;
                return /(日本語吹替|日本語音声|日本語字幕のみ|字幕[:：]?\s*(日本語|中文|中字)|語言\s*(國語|華語|中文|日語|韓語)\s*字幕\s*(中文|中字|日本語))/i.test(value);
            }
            function hasDubMarker(text) {
                return /吹替|吹き替え|日本語吹替|\bdubbed\b|\bdub version\b|配音|配音版|中文配音|國語配音/i.test(text || "");
            }
            function hasOriginalAudioOrSubtitleMarker(text) {
                return /字幕|\bsubtitles?\b|\bsubtitled\b|原音|原聲|原語|\boriginal audio\b|\boriginal language\b/i.test(text || "");
            }
            function isEnglishFriendlyShowing(originalLanguage, subtitleText, formatText, sourceLanguageText) {
                const combinedText = [subtitleText, sourceLanguageText].filter(Boolean).join(" ");
                if (hasEnglishUnfriendlySourceMarker(sourceLanguageText)) return false;
                if (hasExplicitEnglishSubtitleMarker(combinedText)) return true;
                if (normalizeLanguageCode(originalLanguage) !== "en") return false;
                return !(hasDubMarker(formatText) && !hasOriginalAudioOrSubtitleMarker(formatText));
            }
            function applyFilters(showings) {
                const now = new Date();
                const filterTime = state.filters.time;

                return showings.filter(function (showing) {
                    // Filter out past shows (only if they are actually in the past)
                    if (showing.timeMinutes !== null && showing.dateTime && showing.dateTime < now) {
                        return false;
                    }

                    if (state.filters.search && !showing.searchText.includes(state.filters.search)) {
                        return false;
                    }

                    if (state.filters.date !== "all" && showing.dateText !== state.filters.date) {
                        return false;
                    }

                    // Time filter
                    if (filterTime !== "any") {
                        const mins = showing.timeMinutes;
                        if (mins === null) return false;

                        const isMorning = mins < 12 * 60;
                        const isAfternoon = mins >= 12 * 60 && mins < 17 * 60;
                        const isEvening = mins >= 17 * 60 && mins < 21 * 60;
                        const isLate = mins >= 21 * 60;

                        if (filterTime === "morning" && !isMorning) return false;
                        if (filterTime === "afternoon" && !isAfternoon) return false;
                        if (filterTime === "evening" && !isEvening) return false;
                        if (filterTime === "late" && !isLate) return false;
                    }

                    if (state.filters.region !== "all" && showing.region !== state.filters.region) {
                        return false;
                    }
                    if (state.filters.englishFriendly && !showing.isEnglishFriendly) {
                        return false;
                    }
                    if (state.filters.docOnly && !isDocumentary(showing)) {
                        return false;
                    }
                    return true;
                });
            }

            function groupByFilm(showings) {

                    if (!map.has(key)) {
                        map.set(key, {
                            key: key,
                            titleJp: showing.titleJp,
                            titleEn: showing.titleEn,
                            titleDisplay: showing.titleDisplay,
                            year: showing.year,
                            director: showing.director,

                            overview: showing.overview,
                            posterPath: showing.posterPath,
                            formatTags: new Set(),
                            showings: [],
                            letterboxdUrl: showing.letterboxdUrl
                        });
                    }
                    const film = map.get(key);
                    film.showings.push(showing);
                    if (!film.year && showing.year) film.year = showing.year;
                    if (!film.director && showing.director) film.director = showing.director;
                    if (!film.directorEn && showing.directorEn) film.directorEn = showing.directorEn;
                    if (!film.runtime && showing.runtime) film.runtime = showing.runtime;

                    if (!film.titleEn && showing.titleEn) {
                        film.titleEn = showing.titleEn;
                        film.titleDisplay = formatBilingual(film.titleJp, film.titleEn);
                    }
                    if (showing.genres.length && !film.genres.length) film.genres = showing.genres.slice();
                    if (showing.rating > film.rating) film.rating = showing.rating;
                    if (!film.letterboxdUrl && showing.letterboxdUrl) film.letterboxdUrl = showing.letterboxdUrl;
                    showing.formatTags.forEach(function (tag) {
                        film.formatTags.add(tag);
                    });
                });
                const films = Array.from(map.values());
                films.forEach(function (film) {
                    film.showings.sort(compareShowings);
                    film.nextTime = film.showings.length ? timeValue(film.showings[0].dateTime) : Number.POSITIVE_INFINITY;
                    film.formatTags = Array.from(film.formatTags);
                });
                return films;

                                websiteLink.rel = "noopener";
                                cinemaNameCell.appendChild(websiteLink);
                            }
                            row.appendChild(cinemaNameCell);
                            const timeRow = createElement("div", "time-row");
                            appendShowtimeChips(timeRow, showings, function (showing) {
                                const includeDate = state.filters.date === "all";
                                return includeDate && showing.dateText
                                    ? formatDate(showing.dateText, false) + " " + (showing.showtime || t("tbd"))
                                    : (showing.showtime || t("tbd"));
                            }, function (showing) {
                                return getShowtimeTargetUrl(showing, cinemaWebsite);
                            });
                            row.appendChild(timeRow);
                            body.appendChild(row);
                        });
                        card.appendChild(body);
                        fragment.appendChild(card);
                    } catch (e) {
                        console.error("Error rendering film:", film, e);
                    }
                });
                elements.filmResultsList.appendChild(fragment);
            }
            function renderFilmView(showings) {
                elements.cinemaView.classList.add("is-hidden");
                elements.filmView.classList.remove("is-hidden");
                elements.filmResultsList.innerHTML = "";
                elements.filmEmpty.classList.add("is-hidden");
                elements.filmResultsMeta.textContent = getFiltersSummary();
                if (!showings.length) {
                    elements.filmResultsCount.textContent = "0件の上映 (0 showings)";
                    elements.filmEmpty.classList.remove("is-hidden");
                    return;
                }
                const films = groupByFilm(showings);
                if (state.sort === "nearest" && state.location.active) {
                    films.sort(function (a, b) {
                        return compareDistances(getFilmDistance(a), getFilmDistance(b)) || a.nextTime - b.nextTime;
                    });
                } else if (state.sort === "release-new") {
                    films.sort(function (a, b) {
                        const yearA = parseInt(a.year, 10) || 0;
                        const yearB = parseInt(b.year, 10) || 0;
                        if (yearA !== yearB) return yearB - yearA;
                        return (a.titleDisplay || a.titleJp || a.titleEn || "").localeCompare(b.titleDisplay || b.titleJp || b.titleEn || "");
                    });
                } else if (state.sort === "release-old") {
                    films.sort(function (a, b) {
                        const yearA = parseInt(a.year, 10) || 9999;
                        const yearB = parseInt(b.year, 10) || 9999;
                        if (yearA !== yearB) return yearA - yearB;
                        return (a.titleDisplay || a.titleJp || a.titleEn || "").localeCompare(b.titleDisplay || b.titleJp || b.titleEn || "");
                    });
                } else {
                    films.sort(function (a, b) { return a.nextTime - b.nextTime; });
                }
                renderFilmList(films, showings.length);
            }
                         function render() {
                const filtered = applyFilters(state.data);
                if (state.view === "film") {
                    renderFilmView(filtered);
                } else {
                    renderCinemaView(filtered);
                }
            }
            function fetchShowtimes() {
                fetch(jsonUrl + "?t=" + Date.now(), { cache: "no-store" })
                    .then(function (response) {
                        if (!response.ok) {
                            throw new Error("HTTP error " + response.status);
                        }
                        return response.json();
                    })
                    .then(function (data) {
                        const todayText = getJstDateText();
                        state.data = normalizeShowings(data).filter(function (showing) {
                            return showing.dateText >= todayText;
                        });
                        buildFilterOptions(state.data);
                        render();
                    })
                    .catch(function () {
                        elements.cinemaIndex.innerHTML = "";
                        elements.cinemaIndex.appendChild(createElement("div", "loading", t("loadError")));
                        elements.filmResultsList.innerHTML = "";
                        elements.filmResultsList.appendChild(createElement("div", "loading", t("loadError")));
                    });
            }
            // Initialize language button state and UI text
            elements.langButtons.forEach(function (button) {
                const isActive = button.getAttribute("data-lang") === state.lang;
                button.classList.toggle("is-active", isActive);
            });
            updateUIText();
            updateTimeSelect();
            fetchShowtimes();
            if ("serviceWorker" in navigator) {
                navigator.serviceWorker.register("/sw.js");
            }
        });
    </script>
</body>
</html>
