services:
  # The Backend
  - type: web
    name: copro-backend
    env: python
    plan: free # Explicitly setting to free
    region: ohio
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///backend/coproduction.db # Relative to project root
      - key: FRONTEND_URL
        fromService:
          type: web
          name: copro-frontend
          envVar: RENDER_EXTERNAL_URL
      # Add API keys in the Render Dashboard
      # - ANTHROPIC_API_KEY
      # - GEMINI_API_KEY

  # The Frontend
  - type: web
    name: copro-frontend
    env: static
    plan: free # Explicitly setting to free
    region: ohio
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: copro-backend
          envVar: RENDER_EXTERNAL_URL
