services:
  # The Backend
  - type: web
    name: copro-backend
    env: python
    region: ohio
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/coproduction.db
      - key: FRONTEND_URL
        fromService:
          type: web
          name: copro-frontend
          envVar: RENDER_EXTERNAL_URL
      # User must add these securely in the Render dashboard:
      # - ANTHROPIC_API_KEY
      # - GEMINI_API_KEY
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1

  # The Frontend
  - type: web
    name: copro-frontend
    env: static
    region: ohio
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: copro-backend
          envVar: RENDER_EXTERNAL_URL
