services:
  # The Backend (Python/FastAPI Web Service)
  - type: web
    name: copro-backend
    env: python
    plan: free
    region: ohio
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///backend/coproduction.db
      - key: FRONTEND_URL
        fromService:
          type: static
          name: copro-frontend
          property: url
      # Add API keys in the Render Dashboard securely
      # - ANTHROPIC_API_KEY
      # - GEMINI_API_KEY

  # The Frontend (React/Vite Static Site)
  - type: static
    name: copro-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: copro-backend
          property: url
