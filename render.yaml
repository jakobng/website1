services:
  # The Backend (Python Web Service)
  - type: web
    name: copro-backend
    env: python
    plan: free
    region: ohio
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///backend/coproduction.db
      - key: FRONTEND_URL
        value: "*" # Use wildcard for now to avoid blueprint circular dependency errors

  # The Frontend (Static Site)
  - type: web
    name: copro-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: copro-backend
          envVar: RENDER_EXTERNAL_URL
